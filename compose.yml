services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gymrats
      POSTGRES_USER: gymrats
      POSTGRES_PASSWORD: gymrats_local
    ports:
      - "5432:5432"
    volumes:
      - gymrats_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymrats -d gymrats"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  gymrats_postgres:
