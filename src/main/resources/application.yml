spring:
  application:
    name: gymrats-rpg-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gymrats}
    username: ${DB_USERNAME:gymrats}
    password: ${DB_PASSWORD:gymrats_local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-seconds: ${JWT_EXPIRATION:604800}
